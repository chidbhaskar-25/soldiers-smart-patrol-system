{% extends 'base.html' %}

{% block content %}

<h2>Add / Update Soldier</h2>

<form method="POST" enctype="multipart/form-data">
    {% csrf_token %}

    <table>
        {{ form.as_table }}
    </table>

    <br>

    <button type="submit" class="btn">Save Soldier</button>
    <a href="/" class="btn">Back</a>

</form>

{% endblock %}
